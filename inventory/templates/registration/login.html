{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — QR Маркет</title>
    <link rel="stylesheet" href="{% static 'inventory/style.css' %}">
</head>
<body>
<div class="auth-page">
    <div>
        <div class="auth-logo">
            <div class="auth-logo-icon">🟢</div>
            <div class="auth-logo-name">QR Маркет</div>
        </div>
        <div class="auth-card">
            <h1>Вход</h1>
            <p class="hint">Владельцы входят по email, кассиры — по логину</p>
            {% if form.errors %}
            <p class="error" style="margin-bottom:12px">Неверный логин/email или пароль.</p>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="form-row">
                    <label for="id_username">Email (владелец) или логин (кассир)</label>
                    <input type="text" name="username" id="id_username" class="form-control" autofocus required>
                </div>
                <div class="form-row">
                    <label for="id_password">Пароль</label>
                    <input type="password" name="password" id="id_password" class="form-control" required>
                </div>
                <input type="hidden" name="next" value="{{ next }}">
                <button type="submit" class="btn btn-primary" style="width:100%">Войти</button>
            </form>
            <p class="hint" style="text-align:center;margin-top:16px">
                Нет аккаунта? <a href="{% url 'signup' %}">Зарегистрироваться</a>
            </p>
        </div>
    </div>
</div>
</body>
</html>
